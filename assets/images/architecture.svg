<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" width="880" height="600" font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94e2d5"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6e7592"/>
    </marker>
    <style>
      .container-bg { fill: #1e1e2e; }
      .container-stroke { stroke: #94e2d5; stroke-width: 2; fill: none; stroke-dasharray: 6 4; opacity: 0.65; }
      .box { fill: #272738; stroke: #94e2d5; stroke-width: 1.6; }
      .box-secondary { fill: #272738; stroke: #585b70; stroke-width: 1.4; }
      .label-title { fill: #ffffff; font-size: 15px; font-weight: 600; }
      .label-sub { fill: #94e2d5; font-size: 11.5px; letter-spacing: 0.6px; font-weight: 600; text-transform: uppercase; }
      .label-item { fill: #c0c8d6; font-size: 12.5px; }
      .label-item-muted { fill: #8b93a8; font-size: 12px; }
      .label-container { fill: #94e2d5; font-size: 11.5px; letter-spacing: 1.2px; font-weight: 700; text-transform: uppercase; }
      .label-caption { fill: #8b93a8; font-size: 12px; font-style: italic; }
      .wire { stroke: #94e2d5; stroke-width: 1.6; fill: none; opacity: 0.85; }
      .wire-muted { stroke: #6e7592; stroke-width: 1.4; fill: none; }
      .badge { fill: #1e1e2e; stroke: #94e2d5; stroke-width: 1; }
      .badge-text { fill: #94e2d5; font-size: 10.5px; font-weight: 600; }
    </style>
  </defs>

  <!-- Backdrop -->
  <rect x="0" y="0" width="880" height="600" fill="#181825"/>

  <!-- Docker container -->
  <rect x="30" y="60" width="820" height="450" rx="14" class="container-bg"/>
  <rect x="30" y="60" width="820" height="450" rx="14" class="container-stroke"/>
  <text x="56" y="88" class="label-container">DOCKER CONTAINER</text>

  <!-- Web UI -->
  <rect x="80" y="120" width="280" height="90" rx="10" class="box-secondary"/>
  <text x="100" y="150" class="label-sub">Browser / Viewer</text>
  <text x="100" y="174" class="label-title">Web UI</text>
  <text x="100" y="194" class="label-item-muted">HTML + CSS rendered by FastAPI</text>

  <!-- REST API -->
  <rect x="520" y="120" width="280" height="90" rx="10" class="box-secondary"/>
  <text x="540" y="150" class="label-sub">FastAPI</text>
  <text x="540" y="174" class="label-title">REST API</text>
  <text x="540" y="194" class="label-item-muted">/api/content, /api/search, /api/health</text>

  <!-- Wire: Web UI <-> REST API -->
  <line x1="360" y1="165" x2="520" y2="165" class="wire" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- FastMCP Server -->
  <rect x="160" y="262" width="560" height="138" rx="10" class="box"/>
  <text x="184" y="290" class="label-sub">FastMCP</text>
  <text x="184" y="314" class="label-title">MCP Server</text>

  <!-- FastMCP feature pills -->
  <g transform="translate(184, 332)">
    <rect x="0" y="0" width="118" height="22" rx="11" class="badge"/>
    <text x="59" y="15" text-anchor="middle" class="badge-text">Resources (read)</text>

    <rect x="128" y="0" width="100" height="22" rx="11" class="badge"/>
    <text x="178" y="15" text-anchor="middle" class="badge-text">Tools (write)</text>

    <rect x="238" y="0" width="100" height="22" rx="11" class="badge"/>
    <text x="288" y="15" text-anchor="middle" class="badge-text">Notifications</text>

    <rect x="348" y="0" width="115" height="22" rx="11" class="badge"/>
    <text x="406" y="15" text-anchor="middle" class="badge-text">Search (opt-in)</text>
  </g>
  <text x="184" y="384" class="label-item-muted">Streamable HTTP at /mcp · also runnable as stdio</text>

  <!-- Wire: REST API down to FastMCP top -->
  <line x1="660" y1="210" x2="660" y2="262" class="wire" marker-end="url(#arrow)"/>

  <!-- Filesystem -->
  <rect x="80" y="430" width="320" height="60" rx="10" class="box-secondary"/>
  <text x="100" y="455" class="label-title">Filesystem</text>
  <text x="100" y="476" class="label-item-muted">/data/content/ — files are the source of truth</text>

  <!-- Search Engine -->
  <rect x="480" y="430" width="320" height="60" rx="10" class="box-secondary"/>
  <text x="500" y="455" class="label-title">Search Engine <tspan class="label-item-muted">(optional)</tspan></text>
  <text x="500" y="476" class="label-item-muted">numpy + Pydantic AI embedders</text>

  <!-- Wires: FastMCP -> FS, FastMCP -> Search -->
  <line x1="280" y1="400" x2="280" y2="430" class="wire" marker-end="url(#arrow)"/>
  <line x1="600" y1="400" x2="600" y2="430" class="wire" marker-end="url(#arrow)"/>

  <!-- Volume mount annotation -->
  <line x1="240" y1="490" x2="240" y2="540" class="wire-muted" marker-end="url(#arrow-muted)"/>
  <text x="260" y="546" class="label-caption">Volume mount</text>
  <text x="260" y="563" class="label-item-muted" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">./content : /data/content</text>

  <!-- MCP clients label (external, top-right of REST API) -->
  <g transform="translate(620, 24)">
    <text x="0" y="14" class="label-sub" text-anchor="end">↓ MCP &amp; HTTP clients</text>
  </g>
  <line x1="660" y1="36" x2="660" y2="120" class="wire-muted" marker-end="url(#arrow-muted)"/>
</svg>
